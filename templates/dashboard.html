<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Social Media — ICETEX</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { brand: '#1e7abf' } } } }
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; }
  .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all; }
  .card { @apply bg-white rounded-xl shadow-sm border border-gray-100 p-5; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
        PieChart, Pie, Cell, ResponsiveContainer, LabelList } = Recharts;

const PLAT_COLORS = {
  "Facebook":   "#1877F2",
  "Instagram":  "#E1306C",
  "X (Twitter)":"#000000",
  "LinkedIn":   "#0A66C2",
  "TikTok":     "#010101",
  "YouTube":    "#FF0000",
};
const SENT_COLORS = { Positivo:"#27ae60", Negativo:"#e67e22", Crítico:"#e74c3c", Neutro:"#95a5a6" };
const MESES = ["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const ICONS = {
  "Facebook":"f","Instagram":"◉","X (Twitter)":"✕","LinkedIn":"in","TikTok":"♪","YouTube":"▶"
};

function fmtNum(n) {
  if (!n && n !== 0) return "—";
  if (n >= 1000000) return (n/1000000).toFixed(1)+"M";
  if (n >= 1000) return (n/1000).toFixed(1)+"K";
  return n.toLocaleString();
}

function Badge({ tipo }) {
  const map = {
    alerta: "bg-red-100 text-red-700 border-red-200",
    exito:  "bg-green-100 text-green-700 border-green-200",
    info:   "bg-blue-100 text-blue-700 border-blue-200",
  };
  const icons = { alerta:"⚠️", exito:"✅", info:"💡" };
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold border ${map[tipo]||map.info}`}>
      {icons[tipo]||"ℹ️"} {tipo}
    </span>
  );
}

function Spinner() {
  return (
    <div className="flex items-center justify-center h-64">
      <div className="w-10 h-10 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
    </div>
  );
}

function PlatCard({ nombre, data }) {
  const color = PLAT_COLORS[nombre] || "#1e7abf";
  const crec  = data.crecimiento_pct || 0;
  return (
    <div className="card">
      <div className="flex items-center gap-3 mb-4">
        <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm"
             style={{background: color}}>
          {ICONS[nombre] || nombre[0]}
        </div>
        <div>
          <div className="font-bold text-gray-800">{nombre}</div>
          <div className="text-xs text-gray-400">{fmtNum(data.seguidores)} seguidores</div>
        </div>
        <div className={`ml-auto text-sm font-bold ${crec >= 0 ? "text-green-600" : "text-red-500"}`}>
          {crec >= 0 ? "▲" : "▼"} {Math.abs(crec)}%
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2 text-center">
        {[
          ["Visualizaciones", data.visualizaciones],
          ["Engagement",      data.engagement_rate + "%"],
          ["Interacciones",   (data.likes||0)+(data.comentarios||0)+(data.compartidos||0)+(data.guardados||0)],
          ["Tasa Respuesta",  data.tasa_respuesta + "%"],
        ].map(([label, val]) => (
          <div key={label} className="bg-gray-50 rounded-lg p-2">
            <div className="text-xs text-gray-400">{label}</div>
            <div className="font-bold text-gray-800">{typeof val === "number" ? fmtNum(val) : val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PostCard({ post, tipo }) {
  const color = PLAT_COLORS[post.plataforma] || "#1e7abf";
  const recomendaciones = {
    bajo: [
      "Revisar el horario de publicación",
      "Mejorar el copy con llamados a la acción",
      "Agregar elementos visuales más atractivos",
      "Segmentar mejor la audiencia objetivo",
    ]
  };
  return (
    <div className="card mb-3">
      <div className="flex items-start gap-3">
        <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-bold"
             style={{background: color}}>
          {ICONS[post.plataforma] || post.plataforma[0]}
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-sm text-gray-700 mb-2 line-clamp-2">{post.texto || "(Sin texto)"}</div>
          <div className="flex flex-wrap gap-2 text-xs">
            <span className="bg-red-50 text-red-700 px-2 py-0.5 rounded-full">❤️ {fmtNum(post.likes)}</span>
            <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">💬 {fmtNum(post.comentarios)}</span>
            <span className="bg-green-50 text-green-700 px-2 py-0.5 rounded-full">↗ {fmtNum(post.compartidos)}</span>
            <span className="bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded-full">🔖 {fmtNum(post.guardados)}</span>
            <span className="bg-purple-50 text-purple-700 px-2 py-0.5 rounded-full">
              📊 Eng: {post.engagement_rate}%
            </span>
            <span className="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">
              🌐 {post.alcance_no_seg_pct}% no seguidores
            </span>
          </div>
          {tipo === "bajo" && (
            <div className="mt-3 p-2 bg-amber-50 rounded-lg border border-amber-100">
              <div className="text-xs font-semibold text-amber-700 mb-1">💡 Recomendaciones</div>
              <ul className="text-xs text-amber-600 space-y-0.5">
                {recomendaciones.bajo.slice(0,2).map((r,i) => <li key={i}>• {r}</li>)}
              </ul>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TemasChart({ temas }) {
  const data = Object.entries(temas)
    .sort((a, b) => b[1] - a[1])
    .map(([tema, menciones]) => ({ tema: tema.length > 22 ? tema.slice(0,22)+"…" : tema, menciones }));
  if (!data.length) return <div className="text-gray-400 text-sm text-center py-8">Sin temas registrados</div>;
  return (
    <ResponsiveContainer width="100%" height={Math.max(200, data.length * 42)}>
      <BarChart data={data} layout="vertical" margin={{left:10,right:30,top:5,bottom:5}}>
        <CartesianGrid strokeDasharray="3 3" horizontal={false}/>
        <XAxis type="number" tick={{fontSize:11}}/>
        <YAxis type="category" dataKey="tema" width={130} tick={{fontSize:11}}/>
        <Tooltip cursor={{fill:"#f0f7ff"}}/>
        <Bar dataKey="menciones" fill="#1e7abf" radius={[0,6,6,0]}>
          <LabelList dataKey="menciones" position="right" style={{fontSize:11,fill:"#555"}}/>
        </Bar>
      </BarChart>
    </ResponsiveContainer>
  );
}

function SentimientoChart({ sentimiento }) {
  const data = Object.entries(sentimiento)
    .filter(([,v]) => v > 0)
    .map(([name, value]) => ({ name, value }));
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return <div className="text-gray-400 text-sm text-center py-8">Sin datos de sentimiento</div>;
  return (
    <div className="flex flex-col items-center">
      <ResponsiveContainer width="100%" height={220}>
        <PieChart>
          <Pie data={data} cx="50%" cy="50%" innerRadius={55} outerRadius={90}
               dataKey="value" paddingAngle={3}>
            {data.map((entry) => (
              <Cell key={entry.name} fill={SENT_COLORS[entry.name] || "#ccc"}/>
            ))}
          </Pie>
          <Tooltip formatter={(v) => [`${v} (${(v/total*100).toFixed(1)}%)`, ""]}/>
        </PieChart>
      </ResponsiveContainer>
      <div className="flex flex-wrap gap-3 justify-center mt-1">
        {data.map(d => (
          <div key={d.name} className="flex items-center gap-1.5 text-xs">
            <div className="w-3 h-3 rounded-full" style={{background: SENT_COLORS[d.name]}}></div>
            <span className="text-gray-600">{d.name}</span>
            <span className="font-bold text-gray-800">{(d.value/total*100).toFixed(1)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function EvolucionChart({ plataformas }) {
  const data = Object.entries(plataformas)
    .filter(([, m]) => m.seguidores > 0)
    .map(([plat, m]) => ({
      plat,
      "Mes anterior": m.seguidores_ant,
      "Mes actual":   m.seguidores,
      crec:           m.crecimiento_pct,
    }));
  if (!data.length) return <div className="text-gray-400 text-sm text-center py-8">Sin datos de seguidores</div>;
  return (
    <div>
      <ResponsiveContainer width="100%" height={240}>
        <BarChart data={data} margin={{top:5,right:20,left:10,bottom:5}}>
          <CartesianGrid strokeDasharray="3 3"/>
          <XAxis dataKey="plat" tick={{fontSize:11}}/>
          <YAxis tickFormatter={fmtNum} tick={{fontSize:11}}/>
          <Tooltip formatter={fmtNum}/>
          <Legend wrapperStyle={{fontSize:12}}/>
          <Bar dataKey="Mes anterior" fill="#93c5fd" radius={[4,4,0,0]}/>
          <Bar dataKey="Mes actual"   fill="#1e7abf" radius={[4,4,0,0]}/>
        </BarChart>
      </ResponsiveContainer>
      <div className="flex flex-wrap gap-2 mt-3">
        {data.map(d => (
          <div key={d.plat} className="flex items-center gap-1.5 bg-gray-50 px-3 py-1.5 rounded-full text-xs">
            <div className="w-2.5 h-2.5 rounded-full" style={{background: PLAT_COLORS[d.plat]}}></div>
            <span className="font-medium">{d.plat}</span>
            <span className={`font-bold ${d.crec >= 0 ? "text-green-600" : "text-red-500"}`}>
              {d.crec >= 0 ? "+" : ""}{d.crec}%
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Conclusiones({ conclusiones }) {
  if (!conclusiones?.length) return null;
  return (
    <div className="space-y-3">
      {conclusiones.map((c, i) => (
        <div key={i} className={`flex gap-3 p-4 rounded-xl border ${
          c.tipo === "alerta" ? "bg-red-50 border-red-200" :
          c.tipo === "exito"  ? "bg-green-50 border-green-200" :
                                "bg-blue-50 border-blue-200"
        }`}>
          <div className="text-lg flex-shrink-0">
            {c.tipo === "alerta" ? "⚠️" : c.tipo === "exito" ? "✅" : "💡"}
          </div>
          <div className="text-sm text-gray-700">{c.texto}</div>
        </div>
      ))}
    </div>
  );
}

function Sidebar({ seccion, setSeccion }) {
  const links = [
    { id:"metricas",    label:"Métricas Clave",       icon:"📊" },
    { id:"virales",     label:"Posts Virales",          icon:"🔥" },
    { id:"bajos",       label:"Bajo Rendimiento",       icon:"📉" },
    { id:"temas",       label:"Temas de Impacto",       icon:"🏷️" },
    { id:"sentimiento", label:"Análisis de Sentimiento",icon:"😊" },
    { id:"evolucion",   label:"Evolución Seguidores",   icon:"📈" },
    { id:"conclusiones",label:"Conclusiones IA",        icon:"🤖" },
  ];
  return (
    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col min-h-screen sticky top-0">
      <div className="p-5 border-b border-gray-100">
        <div className="text-brand font-bold text-lg">Social Monitor</div>
        <div className="text-xs text-gray-400 mt-0.5">ICETEX — Dashboard</div>
      </div>
      <nav className="flex-1 p-3 space-y-1">
        {links.map(l => (
          <button key={l.id}
            onClick={() => setSeccion(l.id)}
            className={`sidebar-link w-full text-left ${
              seccion === l.id
                ? "bg-brand text-white shadow-sm"
                : "text-gray-600 hover:bg-gray-50"
            }`}>
            <span>{l.icon}</span> {l.label}
          </button>
        ))}
      </nav>
      <div className="p-3 border-t border-gray-100 space-y-1">
        <a href="/dashboard/ingresar"
           className="sidebar-link text-gray-600 hover:bg-blue-50 hover:text-brand w-full">
          ✏️ Ingresar datos
        </a>
        <a href="/admin"
           className="sidebar-link text-gray-600 hover:bg-gray-50 w-full">
          🛠️ Admin comentarios
        </a>
        <a href="/reporte"
           className="sidebar-link text-gray-600 hover:bg-gray-50 w-full">
          📄 Reporte detallado
        </a>
      </div>
    </aside>
  );
}

function App() {
  const now  = new Date();
  const [mes,  setMes]  = useState(now.getMonth() + 1);
  const [anio, setAnio] = useState(now.getFullYear());
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [seccion, setSeccion] = useState("metricas");

  const cargar = useCallback(() => {
    setLoading(true);
    fetch(`/api/dashboard?mes=${mes}&anio=${anio}`)
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, [mes, anio]);

  useEffect(() => { cargar(); }, [cargar]);

  const plats = data?.plataformas || {};
  const hasData = Object.keys(plats).length > 0;

  function Section({ id, title, children }) {
    if (seccion !== id) return null;
    return (
      <div>
        <h2 className="text-xl font-bold text-gray-800 mb-5">{title}</h2>
        {children}
      </div>
    );
  }

  return (
    <div className="flex min-h-screen">
      <Sidebar seccion={seccion} setSeccion={setSeccion}/>
      <main className="flex-1 p-6 max-w-6xl">
        {/* Header */}
        <div className="flex items-center justify-between mb-6">
          <div>
            <h1 className="text-2xl font-bold text-gray-900">Dashboard de Redes Sociales</h1>
            <p className="text-sm text-gray-400 mt-0.5">Monitoreo institucional ICETEX</p>
          </div>
          <div className="flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-4 py-2.5 shadow-sm">
            <label className="text-xs text-gray-500 font-medium">Período:</label>
            <select value={mes} onChange={e => setMes(+e.target.value)}
              className="text-sm font-medium text-gray-700 bg-transparent border-none outline-none">
              {MESES.slice(1).map((m,i) => <option key={i+1} value={i+1}>{m}</option>)}
            </select>
            <input type="number" value={anio} onChange={e => setAnio(+e.target.value)}
              className="w-16 text-sm font-medium text-gray-700 bg-transparent border-none outline-none text-center"/>
            <button onClick={cargar}
              className="ml-1 bg-brand text-white text-xs px-3 py-1.5 rounded-lg hover:opacity-90">
              Cargar
            </button>
          </div>
        </div>

        {loading ? <Spinner/> : !hasData ? (
          <div className="card text-center py-16 text-gray-400">
            <div className="text-5xl mb-4">📊</div>
            <div className="text-lg font-medium">Sin datos para {MESES[mes]} {anio}</div>
            <a href="/dashboard/ingresar"
               className="mt-4 inline-block bg-brand text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:opacity-90">
              Ingresar métricas
            </a>
          </div>
        ) : (
          <>
            <Section id="metricas" title={`📊 Métricas Clave — ${MESES[mes]} ${anio}`}>
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                {Object.entries(plats).map(([nombre, d]) => (
                  <PlatCard key={nombre} nombre={nombre} data={d}/>
                ))}
              </div>
            </Section>

            <Section id="virales" title="🔥 Posts más Virales">
              {data.virales?.length ? data.virales.map(p => (
                <PostCard key={p.id} post={p} tipo="viral"/>
              )) : (
                <div className="text-gray-400 text-sm text-center py-8">Sin publicaciones registradas</div>
              )}
            </Section>

            <Section id="bajos" title="📉 Posts con Menor Rendimiento">
              {data.bajas?.length ? data.bajas.map(p => (
                <PostCard key={p.id} post={p} tipo="bajo"/>
              )) : (
                <div className="text-gray-400 text-sm text-center py-8">Sin publicaciones registradas</div>
              )}
            </Section>

            <Section id="temas" title="🏷️ Análisis de Temas de Impacto">
              <div className="card">
                <TemasChart temas={data.temas || {}}/>
              </div>
            </Section>

            <Section id="sentimiento" title="😊 Análisis de Sentimiento">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="card">
                  <h3 className="font-semibold text-gray-700 mb-4">Distribución global</h3>
                  <SentimientoChart sentimiento={data.sentimiento || {}}/>
                </div>
                <div className="card">
                  <h3 className="font-semibold text-gray-700 mb-4">Por plataforma</h3>
                  <div className="space-y-3">
                    {Object.entries(plats).map(([nombre, d]) => {
                      const s = d.sentimiento || {};
                      const tot = Object.values(s).reduce((a,b)=>a+b,0);
                      if (!tot) return null;
                      return (
                        <div key={nombre}>
                          <div className="flex justify-between text-xs text-gray-500 mb-1">
                            <span className="font-medium">{nombre}</span>
                            <span>{tot} comentarios</span>
                          </div>
                          <div className="flex h-3 rounded-full overflow-hidden gap-0.5">
                            {Object.entries(s).map(([tipo, val]) =>
                              val > 0 ? (
                                <div key={tipo} title={`${tipo}: ${val}`}
                                     style={{width:`${val/tot*100}%`, background:SENT_COLORS[tipo]}}/>
                              ) : null
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </Section>

            <Section id="evolucion" title="📈 Evolución de Seguidores">
              <div className="card">
                <EvolucionChart plataformas={plats}/>
              </div>
            </Section>

            <Section id="conclusiones" title="🤖 Conclusiones Automáticas">
              <div className="card mb-4 bg-gradient-to-r from-brand/5 to-blue-50 border-brand/20">
                <div className="flex items-center gap-2 mb-3">
                  <div className="w-6 h-6 bg-brand rounded-full flex items-center justify-center text-white text-xs">AI</div>
                  <span className="text-sm font-semibold text-gray-700">
                    Análisis generado para {MESES[mes]} {anio}
                  </span>
                </div>
                <Conclusiones conclusiones={data.conclusiones}/>
              </div>
            </Section>
          </>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
