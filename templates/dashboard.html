<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Social Media — ICETEX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f3f6fb;color:#222;display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:230px;background:#fff;border-right:1px solid #e5e9f0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid #f0f0f0}
.sidebar-logo span{color:#1e7abf;font-weight:700;font-size:16px;display:block}
.sidebar-logo small{color:#aaa;font-size:11px}
nav{flex:1;padding:10px 8px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:500;color:#555;cursor:pointer;text-align:left;transition:.15s}
.nav-btn:hover{background:#f0f6fb;color:#1e7abf}
.nav-btn.active{background:#1e7abf;color:#fff}
.sidebar-footer{padding:10px 8px;border-top:1px solid #f0f0f0}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:12px;color:#666;text-decoration:none;transition:.15s}
.sidebar-link:hover{background:#f0f6fb;color:#1e7abf}

/* Main */
main{flex:1;padding:28px 32px;max-width:1100px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;color:#1a2340}
.page-sub{font-size:12px;color:#aaa;margin-top:2px}
.period-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e9f0;border-radius:12px;padding:8px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.period-bar select,.period-bar input{border:none;outline:none;font-size:13px;font-weight:600;color:#333;background:transparent}
.period-bar input{width:60px;text-align:center}
.btn-load{background:#1e7abf;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-load:hover{background:#1565a0}

/* Sections */
.section{display:none}
.section.active{display:block}
.section-title{font-size:17px;font-weight:700;color:#1a2340;margin-bottom:18px}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.plat-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid #eef2f7;transition:.2s}
.plat-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-2px)}
.plat-card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0f4f8}
.plat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0}
.plat-name{font-weight:800;font-size:15px;color:#1a2340}
.plat-seg{font-size:11px;color:#aaa;margin-top:2px}
.plat-crec{margin-left:auto;font-size:13px;font-weight:800;padding:4px 10px;border-radius:20px}
.plat-crec.pos{color:#15803d;background:#dcfce7}
.plat-crec.neg{color:#dc2626;background:#fee2e2}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-box{border-radius:10px;padding:12px;text-align:center}
.kpi-box:nth-child(1){background:#eff6ff;border:1px solid #bfdbfe}
.kpi-box:nth-child(2){background:#f0fdf4;border:1px solid #bbf7d0}
.kpi-box:nth-child(3){background:#fdf4ff;border:1px solid #e9d5ff}
.kpi-box:nth-child(4){background:#fff7ed;border:1px solid #fed7aa}
.kpi-label{font-size:10px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi-val{font-weight:800;font-size:18px;color:#1a2340;margin-top:4px}

/* Chart card */
.chart-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #f0f0f0;margin-bottom:16px}
.chart-card h3{font-size:14px;font-weight:600;color:#444;margin-bottom:16px}
.chart-wrap{position:relative;height:260px}
.chart-wrap-tall{position:relative;height:320px}

/* Posts */
.post-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #f0f0f0;margin-bottom:14px;display:flex;gap:14px;transition:.2s}
.post-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#d0e4f7}
.post-card a.post-link{text-decoration:none;color:inherit;display:flex;gap:14px;width:100%}
.post-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0}
.post-body{flex:1;min-width:0}
.post-meta{font-size:10px;color:#aaa;margin-bottom:4px}
.post-text{font-size:13px;color:#333;margin-bottom:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.tag-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.tag-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.tag-green{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.tag-yellow{background:#fefce8;color:#a16207;border:1px solid #fde68a}
.tag-purple{background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe}
.tag-gray{background:#f9fafb;color:#4b5563;border:1px solid #e5e7eb}
.rec-box{margin-top:12px;background:#fffbea;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;font-size:12px;color:#92400e;line-height:1.7}
.rec-box strong{display:block;margin-bottom:4px;font-size:12px}
.open-link{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;font-weight:700;color:#1d4ed8;text-decoration:none;background:#eff6ff;border:1px solid #bfdbfe;padding:3px 10px;border-radius:20px}
.open-link:hover{background:#dbeafe}

/* Sentimiento */
.sent-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sent-bars{padding:6px 0}
.sent-row{margin-bottom:12px}
.sent-row-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:#555}
.sent-bar-wrap{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex;gap:2px}
.sent-segment{height:100%;border-radius:2px}

/* Evolución */
.crec-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.crec-badge{display:flex;align-items:center;gap:6px;background:#f7faff;border-radius:20px;padding:4px 12px;font-size:12px}
.crec-dot{width:10px;height:10px;border-radius:50%}

/* Conclusiones */
.concl-card{border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;border:1px solid}
.concl-card.alerta{background:#fff5f5;border-color:#fecaca;color:#7f1d1d}
.concl-card.exito{background:#f0fdf4;border-color:#bbf7d0;color:#14532d}
.concl-card.info{background:#eff6ff;border-color:#bfdbfe;color:#1e3a5f}
.concl-icon{font-size:18px;flex-shrink:0}
.concl-text{font-size:13px;line-height:1.6}

/* Spinner */
.spinner{display:flex;align-items:center;justify-content:center;height:200px}
.spin{width:36px;height:36px;border:4px solid #1e7abf;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:#aaa}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px;margin-bottom:16px}
.btn-primary{display:inline-block;background:#1e7abf;color:#fff;padding:10px 24px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600}
.btn-primary:hover{background:#1565a0}

@media(max-width:700px){
  .sidebar{display:none}
  main{padding:16px}
  .sent-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span>Social Monitor</span>
    <small>ICETEX — Dashboard</small>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showSection('metricas',this)">📊 Métricas Clave</button>
    <button class="nav-btn" onclick="showSection('virales',this)">🔥 Posts Virales</button>
    <button class="nav-btn" onclick="showSection('bajos',this)">📉 Bajo Rendimiento</button>
    <button class="nav-btn" onclick="showSection('temas',this)">🏷️ Temas de Impacto</button>
    <button class="nav-btn" onclick="showSection('sentimiento',this)">😊 Sentimiento</button>
    <button class="nav-btn" onclick="showSection('evolucion',this)">📈 Evolución Seguidores</button>
    <button class="nav-btn" onclick="showSection('rendimiento',this)">📊 Análisis Rendimiento</button>
    <button class="nav-btn" onclick="showSection('validador',this)">✅ Validador de Calidad</button>
    <button class="nav-btn" onclick="showSection('conclusiones',this)">🤖 Conclusiones IA</button>
  </nav>
  <div class="sidebar-footer">
    <a href="/formulario" class="sidebar-link">✏️ Ingresar datos</a>
    <a href="/admin" class="sidebar-link">🛠️ Admin comentarios</a>
    <a href="/admin" class="sidebar-link">📄 Generar reporte</a>
  </div>
</aside>

<!-- Main -->
<main>
  <div class="top-bar">
    <div>
      <div class="page-title">Dashboard de Redes Sociales</div>
      <div class="page-sub">Monitoreo institucional ICETEX</div>
    </div>
    <div class="period-bar">
      <span style="font-size:12px;color:#999;font-weight:600">Período:</span>
      <select id="sel-mes">
        <option value="1">Enero</option><option value="2">Febrero</option>
        <option value="3">Marzo</option><option value="4">Abril</option>
        <option value="5">Mayo</option><option value="6">Junio</option>
        <option value="7">Julio</option><option value="8">Agosto</option>
        <option value="9">Septiembre</option><option value="10">Octubre</option>
        <option value="11">Noviembre</option><option value="12">Diciembre</option>
      </select>
      <input type="number" id="inp-anio" value="2026" min="2020" max="2030"/>
      <button class="btn-load" onclick="cargar()">Cargar</button>
    </div>
  </div>

  <div id="contenido">
    <div class="spinner"><div class="spin"></div></div>
  </div>
</main>

<script>
const PLAT_COLORS = {
  "facebook":"#1877F2","instagram":"#E1306C","twitter":"#14171A",
  "linkedin":"#0A66C2","tiktok":"#010101","youtube":"#FF0000",
  "Facebook":"#1877F2","Instagram":"#E1306C","X (Twitter)":"#14171A",
  "LinkedIn":"#0A66C2","TikTok":"#010101","YouTube":"#FF0000"
};
const PLAT_LABELS = {
  "facebook":"Facebook","instagram":"Instagram","twitter":"X / Twitter",
  "linkedin":"LinkedIn","tiktok":"TikTok","youtube":"YouTube"
};
const SENT_COLORS = {"Positivo":"#27ae60","Negativo":"#e67e22","Crítico":"#e74c3c","Neutro":"#95a5a6"};
const MESES = ["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
let charts = [];
let DATA = null;

function fmtNum(n){
  if(n===null||n===undefined) return "—";
  if(n>=1000000) return (n/1000000).toFixed(1)+"M";
  if(n>=1000) return (n/1000).toFixed(1)+"K";
  return Number(n).toLocaleString();
}

function showSection(id, btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const sec = document.getElementById('sec-'+id);
  if(sec) sec.classList.add('active');
  if(btn) btn.classList.add('active');
  setTimeout(renderCharts,100);
}

function renderCharts(){
  charts.forEach(c=>{ try{c.destroy()}catch(e){} });
  charts=[];
  if(!DATA) return;

  // Temas
  const canvTemas = document.getElementById('chart-temas');
  if(canvTemas){
    const temas = DATA.temas||{};
    const labels = Object.keys(temas).slice(0,10);
    const vals   = labels.map(l=>temas[l]);
    charts.push(new Chart(canvTemas,{
      type:'bar',
      data:{labels,datasets:[{data:vals,backgroundColor:'#1e7abf99',borderColor:'#1e7abf',borderWidth:1,borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{beginAtZero:true,grid:{color:'#f0f0f0'}},y:{grid:{display:false}}}}
    }));
  }

  // Sentimiento
  const canvSent = document.getElementById('chart-sent');
  if(canvSent){
    const s = DATA.sentimiento||{};
    const labels = Object.keys(s).filter(k=>s[k]>0);
    const vals   = labels.map(l=>s[l]);
    const colors = labels.map(l=>SENT_COLORS[l]||'#ccc');
    charts.push(new Chart(canvSent,{
      type:'doughnut',
      data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{padding:14,font:{size:12}}}}}
    }));
  }

  // Evolución
  const canvEvol = document.getElementById('chart-evol');
  if(canvEvol){
    const plats = DATA.plataformas||{};
    const labels = Object.keys(plats).filter(p=>plats[p].total_comentarios>0);
    charts.push(new Chart(canvEvol,{
      type:'bar',
      data:{labels,datasets:[
        {label:'Mes anterior',data:labels.map(p=>plats[p].comentarios_mes_ant||0),backgroundColor:'#93c5fd',borderRadius:4},
        {label:'Mes actual',  data:labels.map(p=>plats[p].total_comentarios||0),backgroundColor:'#1e7abf',borderRadius:4},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top'}},
        scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtNum(v)}}}}
    }));
  }
}

function fmtMin(m){
  if(!m&&m!==0) return '—';
  if(m<60) return Math.round(m)+'min';
  if(m<1440) return (m/60).toFixed(1)+'h';
  return (m/1440).toFixed(1)+' días';
}

function progBar(pct, color){
  const c = pct>=80?'#15803d':pct>=50?'#d97706':'#dc2626';
  return `<div style="height:6px;background:#f0f0f0;border-radius:3px;margin-top:4px;overflow:hidden">
    <div style="height:100%;width:${Math.min(pct,100)}%;background:${c};border-radius:3px;transition:.4s"></div></div>`;
}

function buildMetricas(plats){
  if(!Object.keys(plats).length) return emptyState();
  // Totales globales
  const tots = Object.values(plats).reduce((a,d)=>({
    coms:a.coms+(d.total_comentarios||0), resp:a.resp+(d.respondidos||0),
    pubs:a.pubs+(d.publicaciones||0), alcance:a.alcance+(d.alcance||0),
    likes:a.likes+(d.likes||0), shares:a.shares+(d.shares||0),
    nuevos:a.nuevos+(d.nuevos_seguidores||0),
  }),{coms:0,resp:0,pubs:0,alcance:0,likes:0,shares:0,nuevos:0});
  const tasa_global = tots.coms>0?Math.round(tots.resp/tots.coms*100):0;

  const resumen = `<div style="background:linear-gradient(135deg,#1e3a5f,#1976d2);border-radius:14px;padding:18px 22px;margin-bottom:20px;color:#fff">
    <div style="font-size:13px;font-weight:700;opacity:.8;margin-bottom:12px">RESUMEN GLOBAL — TODAS LAS PLATAFORMAS</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      <div style="text-align:center"><div style="font-size:22px;font-weight:800">${fmtNum(tots.coms)}</div><div style="font-size:11px;opacity:.8">💬 Comentarios</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:800">${tasa_global}%</div><div style="font-size:11px;opacity:.8">✅ Tasa respuesta</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:800">${fmtNum(tots.pubs)}</div><div style="font-size:11px;opacity:.8">📝 Publicaciones</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:800">${fmtNum(tots.alcance||0)}</div><div style="font-size:11px;opacity:.8">👁️ Alcance total</div></div>
    </div>
  </div>`;

  const cards = Object.entries(plats).map(([nombre,d])=>{
    const evol  = d.evolucion_pct||0;
    const color = PLAT_COLORS[nombre]||'#1e7abf';
    const label = PLAT_LABELS[nombre]||nombre;
    const tasa  = d.tasa_respuesta||0;
    return `<div class="plat-card">
      <div class="plat-card-head">
        <div class="plat-icon" style="background:${color}">${label[0]}</div>
        <div><div class="plat-name">${label}</div><div class="plat-seg">${fmtNum(d.publicaciones)} publicaciones</div></div>
        <div class="plat-crec ${evol>=0?'pos':'neg'}">${evol>=0?'▲':'▼'} ${Math.abs(evol)}%</div>
      </div>
      <div class="kpi-grid">
        <div class="kpi-box"><div class="kpi-label">💬 Comentarios</div><div class="kpi-val">${fmtNum(d.total_comentarios)}</div></div>
        <div class="kpi-box"><div class="kpi-label">✅ Respondidos</div><div class="kpi-val">${fmtNum(d.respondidos)}</div></div>
        <div class="kpi-box"><div class="kpi-label">❌ Sin respuesta</div><div class="kpi-val" style="color:#dc2626">${fmtNum(d.no_respondidos||0)}</div></div>
        <div class="kpi-box"><div class="kpi-label">⏱ T. Promedio</div><div class="kpi-val">${fmtMin(d.tiempo_promedio_min)}</div></div>
      </div>
      <div style="margin-top:12px;padding:10px;background:#f7faff;border-radius:8px">
        <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:#555">
          <span>Tasa de respuesta</span><span style="color:${tasa>=80?'#15803d':tasa>=50?'#d97706':'#dc2626'}">${tasa}%</span>
        </div>
        ${progBar(tasa)}
      </div>
      ${d.alcance?`<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px;text-align:center">
        <div style="background:#eff6ff;border-radius:6px;padding:6px"><div style="font-weight:700;color:#1d4ed8">${fmtNum(d.alcance)}</div><div style="color:#666">Alcance</div></div>
        <div style="background:#f0fdf4;border-radius:6px;padding:6px"><div style="font-weight:700;color:#15803d">${fmtNum(d.likes||0)}</div><div style="color:#666">Likes</div></div>
        <div style="background:#faf5ff;border-radius:6px;padding:6px"><div style="font-weight:700;color:#7c3aed">${fmtNum(d.shares||0)}</div><div style="color:#666">Compartidos</div></div>
      </div>`:''}
      ${d.avg_ctr?`<div style="margin-top:6px;font-size:11px;color:#666;text-align:center">CTR: <strong>${d.avg_ctr}%</strong> &nbsp;|&nbsp; T.Visionado: <strong>${d.avg_t_vision?d.avg_t_vision+'s':'—'}</strong> &nbsp;|&nbsp; Nuevos seg: <strong>${fmtNum(d.nuevos_seguidores||0)}</strong></div>`:''}
    </div>`;
  }).join('');
  return resumen + `<div class="cards-grid">${cards}</div>`;
}

function buildPost(p, tipo){
  const color = PLAT_COLORS[p.plataforma]||'#1e7abf';
  const label = PLAT_LABELS[p.plataforma]||p.plataforma||'?';
  const scoreTag = tipo==='viral'
    ? `<span class="tag tag-red">🔥 Score: ${fmtNum(p.viral_score)}</span>`
    : `<span class="tag tag-yellow">⚠️ Riesgo: ${p.riesgo}</span>`;
  const linkBtn = p.url && p.url.startsWith('http')
    ? `<a href="${p.url}" target="_blank" rel="noopener" class="open-link">🔗 Ver publicación original ↗</a>`
    : '';
  const recs = tipo==='bajo'
    ? `<div class="rec-box"><strong>💡 Recomendaciones</strong>• Revisar horario de publicación<br>• Mejorar el copy y llamados a la acción<br>• Responder comentarios pendientes</div>`
    : '';
  const fecha = p.fecha ? `<span style="margin-right:8px">📅 ${p.fecha}</span>` : '';
  return `<div class="post-card">
    <div class="post-icon" style="background:${color}">${label[0]}</div>
    <div class="post-body">
      <div class="post-meta">${fecha}<span>📌 ${label}</span></div>
      <div class="post-text">${p.texto||'(Sin texto)'}</div>
      <div class="tags">
        ${scoreTag}
        <span class="tag tag-blue">💬 ${fmtNum(p.n_coms)} comentarios</span>
        <span class="tag tag-green">✅ ${p.tasa||0}% respondido</span>
        <span class="tag tag-purple">👍 ${fmtNum(p.likes||0)} likes</span>
        <span class="tag tag-gray">🔁 ${fmtNum(p.shares||0)} compartidos</span>
      </div>
      ${linkBtn}
      ${recs}
    </div>
  </div>`;
}

let _sentMsgsData = {};

function clickSentCard(cat){
  const panel   = document.getElementById('sent-inline-panel');
  const allCards = document.querySelectorAll('.sent-emoji-card');
  const already  = window._sentCatSel === cat;

  // Deselect all cards visually
  allCards.forEach(c => {
    const k = c.dataset.cat;
    const [,color] = ({Positivo:'#dcfce7|#15803d',Negativo:'#fff7ed|#c2410c',Crítico:'#fee2e2|#dc2626',Neutro:'#f3f4f6|#4b5563'}[k]||'#f3f4f6|#aaa').split('|');
    c.style.transform  = '';
    c.style.boxShadow  = '';
    c.style.borderColor = color+'44';
  });

  if(already){
    // Collapse
    window._sentCatSel = null;
    panel.style.display = 'none';
    return;
  }

  window._sentCatSel = cat;
  const [bg,color] = ({Positivo:'#dcfce7|#15803d',Negativo:'#fff7ed|#c2410c',Crítico:'#fee2e2|#dc2626',Neutro:'#f3f4f6|#4b5563'}[cat]||'#f3f4f6|#aaa').split('|');

  // Highlight selected card
  const sel = document.querySelector(`.sent-emoji-card[data-cat="${cat}"]`);
  if(sel){ sel.style.boxShadow=`0 0 0 3px ${color}`; sel.style.borderColor=color; }

  // Render messages inline
  const msgs = _sentMsgsData[cat]||[];
  panel.innerHTML = buildSentInlinePanel(cat, color, msgs);
  panel.style.display = 'block';
}

          ${m.plataforma?`<span style="font-size:10px;background:${pc}18;color:${pc};padding:1px 7px;border-radius:10px;font-weight:700;border:1px solid ${pc}33">${lbl}</span>`:''}

function buildSentResumen(sent, sentMsgs){
  _sentMsgsData = sentMsgs || {};
  const tot = Object.values(sent).reduce((a,b)=>a+b,0);
  if(!tot) return '<div class="empty-state" style="padding:20px"><p>Sin datos de sentimiento aún.<br><a href="/formulario" class="btn-primary" style="margin-top:10px;display:inline-block">Ingresar datos</a></p></div>';
  const pct  = v => tot>0?(v/tot*100).toFixed(1):0;
  const ICONS  = {Positivo:'😊',Negativo:'😞',Crítico:'😡',Neutro:'😐'};
  const COLORS = {Positivo:'#dcfce7|#15803d',Negativo:'#fff7ed|#c2410c',Crítico:'#fee2e2|#dc2626',Neutro:'#f3f4f6|#4b5563'};
  const cats   = ['Crítico','Negativo','Positivo','Neutro'];
  const cards  = cats.map(k=>{
    const [bg,color] = COLORS[k].split('|');
    const val = sent[k]||0;
    const nMsgs = (sentMsgs[k]||[]).length;
    return `<div class="sent-emoji-card" data-cat="${k}" onclick="clickSentCard('${k}')"
      style="background:${bg};border-radius:14px;padding:20px 16px;text-align:center;
             border:2px solid ${color}44;cursor:pointer;transition:all .2s;user-select:none;position:relative"
      onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 24px ${color}44'"
      onmouseout="if(window._sentCatSel!=='${k}'){this.style.transform='';this.style.boxShadow=''}">
      <div style="font-size:36px;margin-bottom:10px">${ICONS[k]}</div>
      <div style="font-size:28px;font-weight:900;color:${color};line-height:1">${val}</div>
      <div style="font-size:13px;font-weight:700;color:${color};margin-top:4px">${pct(val)}%</div>
      <div style="font-size:12px;color:#555;margin-top:6px;font-weight:600">${k}</div>
      <div style="margin-top:10px;background:${color}18;border-radius:20px;padding:4px 10px;
                  font-size:11px;font-weight:700;color:${color}">
        ${nMsgs} usuario${nMsgs!==1?'s':''} · Ver →
      </div>
    </div>`;
  }).join('');
  // Panel que aparece inline al hacer clic
  const inlinePanel = `<div id="sent-inline-panel" style="display:none;margin-top:-10px;margin-bottom:16px"></div>`;
  const dominante = cats.reduce((a,k)=>(sent[k]||0)>(sent[a]||0)?k:a,'Neutro');
  const diagMsgs  = {Positivo:'Los usuarios expresan satisfacción. ¡Buen trabajo en la atención!',
    Negativo:'Hay malestar en los comentarios. Revisar tiempos y calidad de respuesta.',
    Crítico:'Nivel crítico de inconformidad. Se recomienda activar protocolo de gestión.',
    Neutro:'La mayoría de comentarios son informativos o consultas generales.'};
  return `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:4px">${cards}</div>
    ${inlinePanel}
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;font-size:13px;color:#1e3a5f">
      <strong>📋 Diagnóstico:</strong> Sentimiento dominante: <strong>${dominante}</strong> (${pct(sent[dominante]||0)}% de ${tot} comentarios). ${diagMsgs[dominante]}
    </div>`;
}

function buildSentBars(sent){
  const tot = Object.values(sent).reduce((a,b)=>a+b,0);
  if(!tot) return '<p style="color:#aaa;font-size:13px">Sin datos de sentimiento</p>';
  return Object.entries(sent).filter(([,v])=>v>0).map(([tipo,val])=>{
    const pct = (val/tot*100).toFixed(1);
    return `<div class="sent-row">
      <div class="sent-row-head"><span style="font-weight:600">${tipo}</span><span style="color:#aaa">${val} (${pct}%)</span></div>
      <div class="sent-bar-wrap"><div class="sent-segment" style="width:${pct}%;background:${SENT_COLORS[tipo]||'#ccc'}"></div></div>
    </div>`;
  }).join('');
}

function buildSentBarsOld(plats){
  return Object.entries(plats).map(([nombre,d])=>{
    const s = d.sentimiento||{};
    const tot = Object.values(s).reduce((a,b)=>a+b,0);
    if(!tot) return '';
    const segs = Object.entries(s).filter(([,v])=>v>0).map(([tipo,val])=>
      `<div class="sent-segment" style="width:${(val/tot*100).toFixed(1)}%;background:${SENT_COLORS[tipo]||'#ccc'}" title="${tipo}: ${val}"></div>`
    ).join('');
    return `<div class="sent-row">
      <div class="sent-row-head"><span><strong>${nombre}</strong></span><span style="color:#aaa">${tot} comentarios</span></div>
      <div class="sent-bar-wrap">${segs}</div>
    </div>`;
  }).join('');
}

function buildCrecBadges(plats){
  return Object.entries(plats).filter(([,d])=>d.total_comentarios>0).map(([nombre,d])=>{
    const evol = d.evolucion_pct||0;
    return `<div class="crec-badge">
      <div class="crec-dot" style="background:${PLAT_COLORS[nombre]||'#1e7abf'}"></div>
      <span><strong>${nombre}</strong></span>
      <span style="color:${evol>=0?'#27ae60':'#e74c3c'};font-weight:700">${evol>=0?'+':''}${evol}%</span>
    </div>`;
  }).join('');
}

      <div style="display:flex;gap:14px;align-items:flex-start;background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid ${r.tipo==='alerta'?'#dc2626':r.tipo==='exito'?'#15803d':'#1d4ed8'}">
        <div style="font-size:24px;flex-shrink:0">${r.icono}</div>
        <div>
          <div style="font-weight:700;font-size:13px;margin-bottom:4px;color:${r.tipo==='alerta'?'#dc2626':r.tipo==='exito'?'#15803d':'#1d4ed8'}">${r.titulo}</div>
          <div style="font-size:12px;color:#555;line-height:1.6">${r.texto}</div>
        </div>
      </div>`).join('')}` : '';

  return `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">${kpiHtml}</div>
    ${resumen}${tabla}${recsHtml}`;
}

function buildConclusion(c){

    <div class="concl-icon">${iconMap[c.tipo]||'ℹ️'}</div>
    <div class="concl-text">${c.texto}</div>
  </div>`;
}

function renderDashboard(data){

      <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#5d4037">
        <strong>📐 Fórmula — Score Viral:</strong><br>
        <code style="background:#fff3cd;padding:2px 6px;border-radius:4px;font-size:12px">Score = (Comentarios × 3) + (Compartidos × 2) + (Likes × 1)</code><br><br>
        <strong>¿Cómo funciona?</strong> Los comentarios tienen el mayor peso porque generan conversación real y amplían el alcance orgánico. Los compartidos difunden el contenido a nuevas audiencias. Los likes indican aprobación pero tienen menor impacto en visibilidad. Se muestran los <strong>5 posts con mayor score</strong> del período.

        <strong>📐 Fórmula — Índice de Riesgo:</strong><br>
        <code style="background:#ffe4e6;padding:2px 6px;border-radius:4px;font-size:12px">Riesgo = (100 − Tasa de respuesta) × 0.7 + max(0, 10 − comentarios) × 3</code><br><br>

    <div id="sec-conclusiones" class="section">
      <div class="section-title">🤖 Conclusiones Automáticas — ${mes} ${data.anio}</div>
      ${data.conclusiones&&data.conclusiones.length ? data.conclusiones.map(buildConclusion).join('') : emptyState()}

    showSection('metricas', document.querySelector('.nav-btn'));
  }

function cargar(){
  const mes  = document.getElementById('sel-mes').value;
  const anio = document.getElementById('inp-anio').value;
  document.getElementById('contenido').innerHTML = '<div class="spinner"><div class="spin"></div></div>';
  fetch(`/api/dashboard?mes=${mes}&anio=${anio}`)
    .then(r=>r.json())
    .then(data=>renderDashboard(data))
    .catch(()=>{
      document.getElementById('contenido').innerHTML='<div class="empty-state"><div class="ico">⚠️</div><p>Error al cargar datos</p></div>';
    });
}

function buildTemasDetalle(det, temas){
  // Fallback: si no hay temas_detalle pero sí temas simples
  const entries = Object.entries(det).sort((a,b)=>b[1].count-a[1].count);
  if(!entries.length){
    const fallback = Object.entries(temas).sort((a,b)=>b[1]-a[1]).slice(0,12);
    if(!fallback.length) return '<div class="empty-state" style="padding:30px"><div class="ico">🏷️</div><p>Sin datos de temas aún</p></div>';
    return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
      ${fallback.map(([tema,n])=>`
        <div style="background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #eef2f7;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:600;color:#1a2340">${tema}</span>
          <span style="background:#eff6ff;color:#1d4ed8;font-weight:800;font-size:13px;padding:3px 12px;border-radius:20px">${n}</span>
        </div>`).join('')}
    </div>`;
  }

  const totalGlobal = entries.reduce((a,[,d])=>a+d.count,0);

  return entries.map(([tema,d])=>{
    const tot      = d.count||1;
    const respPct  = Math.round((d.respondidos||0)/tot*100);
    const pctGlobal = totalGlobal>0 ? (tot/totalGlobal*100).toFixed(1) : 0;

    // Barra de sentimiento
    const sentBar = ['Crítico','Negativo','Positivo','Neutro'].filter(k=>d.sent[k]>0).map(k=>
      `<div style="height:100%;width:${(d.sent[k]/tot*100).toFixed(0)}%;background:${SENT_COLORS[k]}" title="${k}: ${d.sent[k]}"></div>`
    ).join('');

    // Chips de sentimiento
    const sentChips = ['Crítico','Negativo','Positivo','Neutro'].filter(k=>d.sent[k]>0).map(k=>
      `<span style="font-size:10px;background:${SENT_COLORS[k]}22;color:${SENT_COLORS[k]};padding:2px 8px;border-radius:10px;font-weight:700;border:1px solid ${SENT_COLORS[k]}44">${k}: ${d.sent[k]}</span>`
    ).join('');

    // Comentarios de ejemplo
    const ejemplos = (d.ejemplos||[]).map((e,i)=>{
      const lbl   = PLAT_LABELS[e.plataforma]||e.plataforma||'';
      const ec    = SENT_COLORS[e.emocion]||'#95a5a6';
      const pc    = PLAT_COLORS[e.plataforma]||'#1e7abf';
      const user  = e.usuario ? `<strong style="color:#333">${e.usuario}</strong>` : '<em style="color:#aaa">Usuario desconocido</em>';
      const link  = e.pub_url && e.pub_url.startsWith('http')
        ? `<a href="${e.pub_url}" target="_blank" rel="noopener"
             style="font-size:10px;color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;padding:1px 8px;border-radius:10px;text-decoration:none;white-space:nowrap">🔗 Ver publicación</a>`
        : '';
      const pubTxt = e.pub_texto ? `<div style="font-size:10px;color:#999;margin-bottom:3px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.pub_texto}">📌 ${e.pub_texto}${e.pub_texto.length>=60?'…':''}</div>` : '';
      const resp  = e.respondido
        ? `<div style="margin-top:5px;background:#f0fdf4;border-radius:5px;padding:5px 8px;font-size:11px;color:#15803d;border-left:3px solid #15803d"><strong>Respuesta ICETEX:</strong> ${(e.texto_resp||'').slice(0,100)}${(e.texto_resp||'').length>100?'…':''}</div>`
        : '';
      return `<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border-left:4px solid ${ec};margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-size:10px;background:${pc}18;color:${pc};padding:1px 7px;border-radius:10px;font-weight:700;border:1px solid ${pc}33">${lbl}</span>
            ${user}
            <span style="font-size:10px;color:${ec};font-weight:700;background:${ec}18;padding:1px 7px;border-radius:10px">${e.emocion}</span>
            <span style="font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;background:${e.respondido?'#dcfce7':'#fee2e2'};color:${e.respondido?'#15803d':'#dc2626'}">${e.respondido?'✅ Respondido':'❌ Sin respuesta'}</span>
          </div>
          ${link}
        </div>
        ${pubTxt}
        <div style="font-size:12px;color:#444;line-height:1.5">${(e.texto||'(Sin texto)').slice(0,160)}${(e.texto||'').length>160?'…':''}</div>
        ${resp}
      </div>`;
    }).join('');

    return `<div style="background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);border:1px solid #eef2f7">
      <!-- Cabecera del tema -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="background:#1e7abf;color:#fff;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px">${tot} comentarios</div>
          <span style="font-size:16px;font-weight:800;color:#1a2340">${tema}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:11px;color:#666">${pctGlobal}% del total</span>
          <span style="font-size:11px;background:${respPct>=70?'#dcfce7':respPct>=40?'#fff7ed':'#fee2e2'};color:${respPct>=70?'#15803d':respPct>=40?'#c2410c':'#dc2626'};padding:3px 10px;border-radius:10px;font-weight:700;border:1px solid ${respPct>=70?'#bbf7d0':respPct>=40?'#fed7aa':'#fecaca'}">${respPct}% respondido</span>
        </div>
      </div>
      <!-- Barra de sentimiento -->
      <div style="height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex;margin-bottom:8px">${sentBar}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${sentChips}</div>
      <!-- Comentarios -->
      <div style="border-top:1px solid #f0f4f8;padding-top:12px">
        <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Comentarios relacionados</div>
        ${ejemplos||'<div style="color:#aaa;font-size:12px;padding:8px 0">Sin comentarios de ejemplo</div>'}
      </div>
    </div>`;
  }).join('');
}

function smTab(uid, cat){
  ['Crítico','Negativo','Positivo','Neutro'].forEach(c=>{
    const tab   = document.getElementById(`${uid}-tab-${c}`);
    const panel = document.getElementById(`${uid}-panel-${c}`);
    if(!tab||!panel) return;
    const active = c===cat;
    tab.style.background = active ? (SENT_COLORS[c]||'#aaa') : '#f0f4f8';
    tab.style.color      = active ? '#fff' : '#555';
    panel.style.display  = active ? 'block' : 'none';
  });
}

function buildSentMsgs(msgs){
  const cats = ['Crítico','Negativo','Positivo','Neutro'];
  if(!cats.some(c=>(msgs[c]||[]).length>0))
    return '<p style="color:#aaa;font-size:13px;text-align:center;padding:20px">Sin mensajes clasificados para este período. <a href="/formulario">Ingresa datos</a></p>';
  const uid = 'sm'+Date.now();
  window._sentUid = uid;
  const tabs = cats.map((cat,i)=>{
    const n = (msgs[cat]||[]).length;
    const color = SENT_COLORS[cat]||'#aaa';
    return `<button onclick="smTab('${uid}','${cat}')" id="${uid}-tab-${cat}"
      style="padding:8px 18px;border:none;border-radius:8px 8px 0 0;font-size:12px;font-weight:700;cursor:pointer;
             background:${i===0?color:'#f0f4f8'};color:${i===0?'#fff':'#555'};transition:.2s">
      ${cat} <span style="font-size:11px;opacity:.85">(${n})</span></button>`;
  }).join('');

  const panels = cats.map((cat,i)=>{
    const list  = (msgs[cat]||[]);
    const color = SENT_COLORS[cat]||'#aaa';
    const rows  = list.length ? list.map(m=>{
      const lbl  = PLAT_LABELS[m.plataforma]||m.plataforma||'';
      const pc   = PLAT_COLORS[m.plataforma]||'#1e7abf';
      const link = m.pub_url && m.pub_url.startsWith('http')
        ? `<a href="${m.pub_url}" target="_blank" rel="noopener"
             style="font-size:10px;color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;
                    padding:2px 9px;border-radius:10px;text-decoration:none;white-space:nowrap;flex-shrink:0">
             🔗 Ver publicación</a>`
        : '';
      const pubBanner = m.pub_texto
        ? `<div style="background:#f0f4ff;border-radius:6px;padding:6px 10px;margin-bottom:8px;
                       font-size:11px;color:#1a2340;border-left:3px solid ${pc};
                       display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
             <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
               <strong style="color:${pc}">📌 ${lbl}:</strong> ${m.pub_texto}${m.pub_texto.length>=70?'…':''}
             </span>
             ${link}
           </div>`
        : link
          ? `<div style="text-align:right;margin-bottom:6px">${link}</div>`
          : '';
      return `<div style="border:1px solid #f0f0f0;border-radius:12px;padding:14px 16px;
                          margin-bottom:12px;border-left:4px solid ${color}">
        ${pubBanner}
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:700;color:#1a2340">${m.usuario||'Usuario desconocido'}</span>
            ${m.plataforma
              ? `<span style="font-size:10px;background:${pc}18;color:${pc};padding:1px 7px;border-radius:10px;font-weight:700;border:1px solid ${pc}33">${lbl}</span>`
              : ''}
            ${m.fecha ? `<span style="font-size:10px;color:#aaa">${m.fecha}</span>` : ''}
          </div>
          <span style="font-size:10px;padding:2px 9px;border-radius:10px;font-weight:700;flex-shrink:0;
                       background:${m.respondido?'#dcfce7':'#fee2e2'};
                       color:${m.respondido?'#15803d':'#dc2626'}">
            ${m.respondido?'✅ Respondido':'❌ Sin respuesta'}
          </span>
        </div>
        <div style="font-size:13px;color:#333;line-height:1.55;margin-bottom:${m.texto_resp?'10px':'0'}">
          ${m.texto||'(Sin texto)'}
        </div>
        ${m.texto_resp
          ? `<div style="background:#f7faff;border-radius:7px;padding:9px 12px;
                         font-size:12px;color:#555;border-left:3px solid #1e7abf">
               <strong style="font-size:10px;color:#1e7abf;text-transform:uppercase;
                              letter-spacing:.3px">Respuesta ICETEX:</strong><br>
               <span style="line-height:1.5">${m.texto_resp}</span>
             </div>`
          : ''}
      </div>`;
    }).join('') : `<div style="text-align:center;padding:32px;color:#aaa;font-size:13px">
      No hay comentarios ${cat.toLowerCase()} en este período
    </div>`;
    return `<div id="${uid}-panel-${cat}" style="display:${i===0?'block':'none'}">${rows}</div>`;
  }).join('');

  return `<div>
    <div style="display:flex;gap:4px;border-bottom:2px solid #e5e9f0;flex-wrap:wrap">${tabs}</div>
    <div style="padding:16px 0">${panels}</div>
  </div>`;
}

async function validarCalidad(){
  const comentario = document.getElementById('val-comentario').value.trim();
  const respuesta  = document.getElementById('val-respuesta').value.trim();
  const resDiv     = document.getElementById('val-resultado');
  if(!comentario){ alert('Por favor ingresa el mensaje del usuario.'); return; }
  resDiv.style.display = 'none';
  const btn = document.querySelector('#sec-validador button');
  const origText = btn.textContent;
  btn.textContent = '⏳ Analizando...';
  btn.disabled = true;
  try{
    const r = await fetch('/api/validar-calidad',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({comentario, respuesta})
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    const scoreColors = ['#dc2626','#f59e0b','#d97706','#1d4ed8','#15803d'];
    const scoreBgs    = ['#fee2e2','#fffbea','#fff7ed','#eff6ff','#f0fdf4'];
    const scoreBcs    = ['#fecaca','#fde68a','#fed7aa','#bfdbfe','#bbf7d0'];
    const sc = d.score||0;
    const stars = '★'.repeat(sc)+'☆'.repeat(4-sc);
    const bar = `<div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;margin-top:8px">
      <div style="height:100%;width:${sc*25}%;background:${scoreColors[sc]};border-radius:5px;transition:.5s"></div></div>`;
    resDiv.innerHTML = `
      <div style="border:2px solid ${scoreBcs[sc]};background:${scoreBgs[sc]};border-radius:14px;padding:20px 24px">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
          <div style="font-size:40px;font-weight:900;color:${scoreColors[sc]}">${sc}<span style="font-size:16px">/4</span></div>
          <div>
            <div style="font-size:18px;font-weight:800;color:${scoreColors[sc]}">${d.nivel||''}</div>
            <div style="font-size:16px;color:#aaa">${stars}</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-size:11px;color:#666;font-weight:700;text-transform:uppercase">Relevancia</div>
            <div style="font-size:22px;font-weight:800;color:${scoreColors[sc]}">${d.relevancia_pct||0}%</div>
          </div>
        </div>
        ${bar}
        <div style="margin-top:14px;background:#fff;border-radius:8px;padding:12px 14px;font-size:13px;color:#333;line-height:1.6">
          <strong>📋 Análisis:</strong> ${d.motivo||''}
        </div>
        <div style="margin-top:10px;background:#fffbea;border:1px solid #fde68a;border-radius:8px;padding:12px 14px;font-size:13px;color:#92400e;line-height:1.6">
          <strong>💡 Sugerencia:</strong> ${d.sugerencia||''}
        </div>
      </div>`;
    resDiv.style.display = 'block';
  } catch(e){
    resDiv.innerHTML = `<div style="background:#fee2e2;border-radius:8px;padding:12px;color:#dc2626;font-size:13px">⚠️ Error al validar: ${e.message}</div>`;
    resDiv.style.display = 'block';
  } finally{
    btn.textContent = origText;
    btn.disabled = false;
  }
}

// Inicializar con mes actual
const now = new Date();
document.getElementById('sel-mes').value = now.getMonth()+1;
document.getElementById('inp-anio').value = now.getFullYear();
cargar();
</script>
</body>
</html>
