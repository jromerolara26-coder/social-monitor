<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Social Media — ICETEX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f3f6fb;color:#222;display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:230px;background:#fff;border-right:1px solid #e5e9f0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid #f0f0f0}
.sidebar-logo span{color:#1e7abf;font-weight:700;font-size:16px;display:block}
.sidebar-logo small{color:#aaa;font-size:11px}
nav{flex:1;padding:10px 8px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:500;color:#555;cursor:pointer;text-align:left;transition:.15s}
.nav-btn:hover{background:#f0f6fb;color:#1e7abf}
.nav-btn.active{background:#1e7abf;color:#fff}
.sidebar-footer{padding:10px 8px;border-top:1px solid #f0f0f0}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:12px;color:#666;text-decoration:none;transition:.15s}
.sidebar-link:hover{background:#f0f6fb;color:#1e7abf}

/* Main */
main{flex:1;padding:28px 32px;max-width:1100px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;color:#1a2340}
.page-sub{font-size:12px;color:#aaa;margin-top:2px}
.period-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e9f0;border-radius:12px;padding:8px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.period-bar select,.period-bar input{border:none;outline:none;font-size:13px;font-weight:600;color:#333;background:transparent}
.period-bar input{width:60px;text-align:center}
.btn-load{background:#1e7abf;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-load:hover{background:#1565a0}

/* Sections */
.section{display:none}
.section.active{display:block}
.section-title{font-size:17px;font-weight:700;color:#1a2340;margin-bottom:18px}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.plat-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid #eef2f7;transition:.2s}
.plat-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-2px)}
.plat-card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0f4f8}
.plat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0}
.plat-name{font-weight:800;font-size:15px;color:#1a2340}
.plat-seg{font-size:11px;color:#aaa;margin-top:2px}
.plat-crec{margin-left:auto;font-size:13px;font-weight:800;padding:4px 10px;border-radius:20px}
.plat-crec.pos{color:#15803d;background:#dcfce7}
.plat-crec.neg{color:#dc2626;background:#fee2e2}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-box{border-radius:10px;padding:12px;text-align:center}
.kpi-box:nth-child(1){background:#eff6ff;border:1px solid #bfdbfe}
.kpi-box:nth-child(2){background:#f0fdf4;border:1px solid #bbf7d0}
.kpi-box:nth-child(3){background:#fdf4ff;border:1px solid #e9d5ff}
.kpi-box:nth-child(4){background:#fff7ed;border:1px solid #fed7aa}
.kpi-label{font-size:10px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi-val{font-weight:800;font-size:18px;color:#1a2340;margin-top:4px}

/* Chart card */
.chart-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #f0f0f0;margin-bottom:16px}
.chart-card h3{font-size:14px;font-weight:600;color:#444;margin-bottom:16px}
.chart-wrap{position:relative;height:260px}
.chart-wrap-tall{position:relative;height:320px}

/* Posts */
.post-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #f0f0f0;margin-bottom:14px;display:flex;gap:14px;transition:.2s}
.post-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#d0e4f7}
.post-card a.post-link{text-decoration:none;color:inherit;display:flex;gap:14px;width:100%}
.post-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0}
.post-body{flex:1;min-width:0}
.post-meta{font-size:10px;color:#aaa;margin-bottom:4px}
.post-text{font-size:13px;color:#333;margin-bottom:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.tag-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.tag-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.tag-green{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.tag-yellow{background:#fefce8;color:#a16207;border:1px solid #fde68a}
.tag-purple{background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe}
.tag-gray{background:#f9fafb;color:#4b5563;border:1px solid #e5e7eb}
.rec-box{margin-top:12px;background:#fffbea;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;font-size:12px;color:#92400e;line-height:1.7}
.rec-box strong{display:block;margin-bottom:4px;font-size:12px}
.open-link{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;font-weight:700;color:#1d4ed8;text-decoration:none;background:#eff6ff;border:1px solid #bfdbfe;padding:3px 10px;border-radius:20px}
.open-link:hover{background:#dbeafe}

/* Sentimiento */
.sent-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sent-bars{padding:6px 0}
.sent-row{margin-bottom:12px}
.sent-row-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:#555}
.sent-bar-wrap{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;display:flex;gap:2px}
.sent-segment{height:100%;border-radius:2px}

/* Evolución */
.crec-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.crec-badge{display:flex;align-items:center;gap:6px;background:#f7faff;border-radius:20px;padding:4px 12px;font-size:12px}
.crec-dot{width:10px;height:10px;border-radius:50%}

/* Conclusiones */
.concl-card{border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;border:1px solid}
.concl-card.alerta{background:#fff5f5;border-color:#fecaca;color:#7f1d1d}
.concl-card.exito{background:#f0fdf4;border-color:#bbf7d0;color:#14532d}
.concl-card.info{background:#eff6ff;border-color:#bfdbfe;color:#1e3a5f}
.concl-icon{font-size:18px;flex-shrink:0}
.concl-text{font-size:13px;line-height:1.6}

/* Spinner */
.spinner{display:flex;align-items:center;justify-content:center;height:200px}
.spin{width:36px;height:36px;border:4px solid #1e7abf;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:#aaa}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px;margin-bottom:16px}
.btn-primary{display:inline-block;background:#1e7abf;color:#fff;padding:10px 24px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600}
.btn-primary:hover{background:#1565a0}

@media(max-width:700px){
  .sidebar{display:none}
  main{padding:16px}
  .sent-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span>Social Monitor</span>
    <small>ICETEX — Dashboard</small>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showSection('metricas',this)">📊 Métricas Clave</button>
    <button class="nav-btn" onclick="showSection('virales',this)">🔥 Posts Virales</button>
    <button class="nav-btn" onclick="showSection('bajos',this)">📉 Bajo Rendimiento</button>
    <button class="nav-btn" onclick="showSection('temas',this)">🏷️ Temas de Impacto</button>
    <button class="nav-btn" onclick="showSection('sentimiento',this)">😊 Sentimiento</button>
    <button class="nav-btn" onclick="showSection('evolucion',this)">📈 Evolución Seguidores</button>
    <button class="nav-btn" onclick="showSection('conclusiones',this)">🤖 Conclusiones IA</button>
  </nav>
  <div class="sidebar-footer">
    <a href="/formulario" class="sidebar-link">✏️ Ingresar datos</a>
    <a href="/admin" class="sidebar-link">🛠️ Admin comentarios</a>
    <a href="/reporte" class="sidebar-link">📄 Reporte detallado</a>
  </div>
</aside>

<!-- Main -->
<main>
  <div class="top-bar">
    <div>
      <div class="page-title">Dashboard de Redes Sociales</div>
      <div class="page-sub">Monitoreo institucional ICETEX</div>
    </div>
    <div class="period-bar">
      <span style="font-size:12px;color:#999;font-weight:600">Período:</span>
      <select id="sel-mes">
        <option value="1">Enero</option><option value="2">Febrero</option>
        <option value="3">Marzo</option><option value="4">Abril</option>
        <option value="5">Mayo</option><option value="6">Junio</option>
        <option value="7">Julio</option><option value="8">Agosto</option>
        <option value="9">Septiembre</option><option value="10">Octubre</option>
        <option value="11">Noviembre</option><option value="12">Diciembre</option>
      </select>
      <input type="number" id="inp-anio" value="2026" min="2020" max="2030"/>
      <button class="btn-load" onclick="cargar()">Cargar</button>
    </div>
  </div>

  <div id="contenido">
    <div class="spinner"><div class="spin"></div></div>
  </div>
</main>

<script>
const PLAT_COLORS = {
  "facebook":"#1877F2","instagram":"#E1306C","twitter":"#14171A",
  "linkedin":"#0A66C2","tiktok":"#010101","youtube":"#FF0000",
  "Facebook":"#1877F2","Instagram":"#E1306C","X (Twitter)":"#14171A",
  "LinkedIn":"#0A66C2","TikTok":"#010101","YouTube":"#FF0000"
};
const PLAT_LABELS = {
  "facebook":"Facebook","instagram":"Instagram","twitter":"X / Twitter",
  "linkedin":"LinkedIn","tiktok":"TikTok","youtube":"YouTube"
};
const SENT_COLORS = {"Positivo":"#27ae60","Negativo":"#e67e22","Crítico":"#e74c3c","Neutro":"#95a5a6"};
const MESES = ["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
let charts = [];
let DATA = null;

function fmtNum(n){
  if(n===null||n===undefined) return "—";
  if(n>=1000000) return (n/1000000).toFixed(1)+"M";
  if(n>=1000) return (n/1000).toFixed(1)+"K";
  return Number(n).toLocaleString();
}

function showSection(id, btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const sec = document.getElementById('sec-'+id);
  if(sec) sec.classList.add('active');
  if(btn) btn.classList.add('active');
  setTimeout(renderCharts,100);
}

function renderCharts(){
  charts.forEach(c=>{ try{c.destroy()}catch(e){} });
  charts=[];
  if(!DATA) return;

  // Temas
  const canvTemas = document.getElementById('chart-temas');
  if(canvTemas){
    const temas = DATA.temas||{};
    const labels = Object.keys(temas).slice(0,10);
    const vals   = labels.map(l=>temas[l]);
    charts.push(new Chart(canvTemas,{
      type:'bar',
      data:{labels,datasets:[{data:vals,backgroundColor:'#1e7abf99',borderColor:'#1e7abf',borderWidth:1,borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{beginAtZero:true,grid:{color:'#f0f0f0'}},y:{grid:{display:false}}}}
    }));
  }

  // Sentimiento
  const canvSent = document.getElementById('chart-sent');
  if(canvSent){
    const s = DATA.sentimiento||{};
    const labels = Object.keys(s).filter(k=>s[k]>0);
    const vals   = labels.map(l=>s[l]);
    const colors = labels.map(l=>SENT_COLORS[l]||'#ccc');
    charts.push(new Chart(canvSent,{
      type:'doughnut',
      data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{padding:14,font:{size:12}}}}}
    }));
  }

  // Evolución
  const canvEvol = document.getElementById('chart-evol');
  if(canvEvol){
    const plats = DATA.plataformas||{};
    const labels = Object.keys(plats).filter(p=>plats[p].total_comentarios>0);
    charts.push(new Chart(canvEvol,{
      type:'bar',
      data:{labels,datasets:[
        {label:'Mes anterior',data:labels.map(p=>plats[p].comentarios_mes_ant||0),backgroundColor:'#93c5fd',borderRadius:4},
        {label:'Mes actual',  data:labels.map(p=>plats[p].total_comentarios||0),backgroundColor:'#1e7abf',borderRadius:4},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top'}},
        scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>fmtNum(v)}}}}
    }));
  }
}

function fmtMin(m){
  if(!m&&m!==0) return '—';
  if(m<60) return Math.round(m)+'min';
  if(m<1440) return (m/60).toFixed(1)+'h';
  return (m/1440).toFixed(1)+' días';
}

function buildMetricas(plats){
  if(!Object.keys(plats).length) return emptyState();
  return Object.entries(plats).map(([nombre,d])=>{
    const evol = d.evolucion_pct||0;
    const color = PLAT_COLORS[nombre]||'#1e7abf';
    const label = PLAT_LABELS[nombre]||nombre;
    return `<div class="plat-card">
      <div class="plat-card-head">
        <div class="plat-icon" style="background:${color}">${label[0]}</div>
        <div><div class="plat-name">${label}</div><div class="plat-seg">${fmtNum(d.total_comentarios)} comentarios</div></div>
        <div class="plat-crec ${evol>=0?'pos':'neg'}">${evol>=0?'▲':'▼'} ${Math.abs(evol)}%</div>
      </div>
      <div class="kpi-grid">
        <div class="kpi-box"><div class="kpi-label">Publicaciones</div><div class="kpi-val">${fmtNum(d.publicaciones)}</div></div>
        <div class="kpi-box"><div class="kpi-label">Tasa Respuesta</div><div class="kpi-val">${d.tasa_respuesta||0}%</div></div>
        <div class="kpi-box"><div class="kpi-label">Respondidos</div><div class="kpi-val">${fmtNum(d.respondidos)}</div></div>
        <div class="kpi-box"><div class="kpi-label">T. Promedio</div><div class="kpi-val">${fmtMin(d.tiempo_promedio_min)}</div></div>
      </div>
    </div>`;
  }).join('');
}

function buildPost(p, tipo){
  const color = PLAT_COLORS[p.plataforma]||'#1e7abf';
  const label = PLAT_LABELS[p.plataforma]||p.plataforma||'?';
  const scoreTag = tipo==='viral'
    ? `<span class="tag tag-red">🔥 Score: ${fmtNum(p.viral_score)}</span>`
    : `<span class="tag tag-yellow">⚠️ Riesgo: ${p.riesgo}</span>`;
  const linkBtn = p.url && p.url.startsWith('http')
    ? `<a href="${p.url}" target="_blank" rel="noopener" class="open-link">🔗 Ver publicación original ↗</a>`
    : '';
  const recs = tipo==='bajo'
    ? `<div class="rec-box"><strong>💡 Recomendaciones</strong>• Revisar horario de publicación<br>• Mejorar el copy y llamados a la acción<br>• Responder comentarios pendientes</div>`
    : '';
  const fecha = p.fecha ? `<span style="margin-right:8px">📅 ${p.fecha}</span>` : '';
  return `<div class="post-card">
    <div class="post-icon" style="background:${color}">${label[0]}</div>
    <div class="post-body">
      <div class="post-meta">${fecha}<span>📌 ${label}</span></div>
      <div class="post-text">${p.texto||'(Sin texto)'}</div>
      <div class="tags">
        ${scoreTag}
        <span class="tag tag-blue">💬 ${fmtNum(p.n_coms)} comentarios</span>
        <span class="tag tag-green">✅ ${p.tasa||0}% respondido</span>
        <span class="tag tag-purple">👍 ${fmtNum(p.likes||0)} likes</span>
        <span class="tag tag-gray">🔁 ${fmtNum(p.shares||0)} compartidos</span>
      </div>
      ${linkBtn}
      ${recs}
    </div>
  </div>`;
}

function buildSentBars(sent){
  const tot = Object.values(sent).reduce((a,b)=>a+b,0);
  if(!tot) return '<p style="color:#aaa;font-size:13px">Sin datos de sentimiento</p>';
  return Object.entries(sent).filter(([,v])=>v>0).map(([tipo,val])=>{
    const pct = (val/tot*100).toFixed(1);
    return `<div class="sent-row">
      <div class="sent-row-head"><span style="font-weight:600">${tipo}</span><span style="color:#aaa">${val} (${pct}%)</span></div>
      <div class="sent-bar-wrap"><div class="sent-segment" style="width:${pct}%;background:${SENT_COLORS[tipo]||'#ccc'}"></div></div>
    </div>`;
  }).join('');
}

function buildSentBarsOld(plats){
  return Object.entries(plats).map(([nombre,d])=>{
    const s = d.sentimiento||{};
    const tot = Object.values(s).reduce((a,b)=>a+b,0);
    if(!tot) return '';
    const segs = Object.entries(s).filter(([,v])=>v>0).map(([tipo,val])=>
      `<div class="sent-segment" style="width:${(val/tot*100).toFixed(1)}%;background:${SENT_COLORS[tipo]||'#ccc'}" title="${tipo}: ${val}"></div>`
    ).join('');
    return `<div class="sent-row">
      <div class="sent-row-head"><span><strong>${nombre}</strong></span><span style="color:#aaa">${tot} comentarios</span></div>
      <div class="sent-bar-wrap">${segs}</div>
    </div>`;
  }).join('');
}

function buildCrecBadges(plats){
  return Object.entries(plats).filter(([,d])=>d.total_comentarios>0).map(([nombre,d])=>{
    const evol = d.evolucion_pct||0;
    return `<div class="crec-badge">
      <div class="crec-dot" style="background:${PLAT_COLORS[nombre]||'#1e7abf'}"></div>
      <span><strong>${nombre}</strong></span>
      <span style="color:${evol>=0?'#27ae60':'#e74c3c'};font-weight:700">${evol>=0?'+':''}${evol}%</span>
    </div>`;
  }).join('');
}

function buildConclusion(c){
  const iconMap = {alerta:'⚠️',exito:'✅',info:'💡'};
  return `<div class="concl-card ${c.tipo}">
    <div class="concl-icon">${iconMap[c.tipo]||'ℹ️'}</div>
    <div class="concl-text">${c.texto}</div>
  </div>`;
}

function emptyState(){
  return `<div class="empty-state">
    <div class="ico">📊</div>
    <p>Sin datos para este período</p>
    <a href="/formulario" class="btn-primary">Ingresar datos</a>
  </div>`;
}

function renderDashboard(data){
  DATA = data;
  const plats = data.plataformas||{};
  const hasData = Object.keys(plats).length>0;
  const mes = MESES[data.mes]||'';

  document.getElementById('contenido').innerHTML = `
    <div id="sec-metricas" class="section active">
      <div class="section-title">📊 Métricas Clave — ${mes} ${data.anio}</div>
      <div class="cards-grid">${hasData ? buildMetricas(plats) : emptyState()}</div>
    </div>

    <div id="sec-virales" class="section">
      <div class="section-title">🔥 Posts más Virales</div>
      <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#5d4037">
        <strong>📐 Fórmula — Score Viral:</strong><br>
        <code style="background:#fff3cd;padding:2px 6px;border-radius:4px;font-size:12px">Score = (Comentarios × 3) + (Compartidos × 2) + (Likes × 1)</code><br><br>
        <strong>¿Cómo funciona?</strong> Los comentarios tienen el mayor peso porque generan conversación real y amplían el alcance orgánico. Los compartidos difunden el contenido a nuevas audiencias. Los likes indican aprobación pero tienen menor impacto en visibilidad. Se muestran los <strong>5 posts con mayor score</strong> del período.
      </div>
      ${data.virales&&data.virales.length ? data.virales.map(p=>buildPost(p,'viral')).join('') : emptyState()}
    </div>

    <div id="sec-bajos" class="section">
      <div class="section-title">📉 Posts con Menor Rendimiento</div>
      <div style="background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#7f1d1d">
        <strong>📐 Fórmula — Índice de Riesgo:</strong><br>
        <code style="background:#ffe4e6;padding:2px 6px;border-radius:4px;font-size:12px">Riesgo = (100 − Tasa de respuesta) × 0.7 + max(0, 10 − comentarios) × 3</code><br><br>
        <strong>¿Cómo funciona?</strong> Penaliza dos factores: una <strong>baja tasa de respuesta</strong> (comentarios sin respuesta de ICETEX, peso 70%) y un <strong>bajo volumen de interacción</strong> (posts con menos de 10 comentarios, peso 30%). A mayor índice, más urgente es revisar ese contenido. Se muestran los <strong>5 posts con mayor riesgo</strong>.
      </div>
      ${data.bajas&&data.bajas.length ? data.bajas.map(p=>buildPost(p,'bajo')).join('') : emptyState()}
    </div>

    <div id="sec-temas" class="section">
      <div class="section-title">🏷️ Análisis de Temas de Impacto</div>
      <div class="chart-card">
        <h3>Volumen de menciones por tema</h3>
        <div class="chart-wrap-tall"><canvas id="chart-temas"></canvas></div>
      </div>
    </div>

    <div id="sec-sentimiento" class="section">
      <div class="section-title">😊 Análisis de Sentimiento</div>
      <div class="sent-grid">
        <div class="chart-card">
          <h3>Distribución global</h3>
          <div class="chart-wrap"><canvas id="chart-sent"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>Por plataforma</h3>
          <div class="sent-bars">${buildSentBars(data.sentimiento||{})}</div>
        </div>
      </div>
    </div>

    <div id="sec-evolucion" class="section">
      <div class="section-title">📈 Evolución de Seguidores</div>
      <div class="chart-card">
        <h3>Mes anterior vs. Mes actual</h3>
        <div class="chart-wrap-tall"><canvas id="chart-evol"></canvas></div>
        <div class="crec-badges">${hasData ? buildCrecBadges(plats) : ''}</div>
      </div>
    </div>

    <div id="sec-conclusiones" class="section">
      <div class="section-title">🤖 Conclusiones Automáticas — ${mes} ${data.anio}</div>
      ${data.conclusiones&&data.conclusiones.length ? data.conclusiones.map(buildConclusion).join('') : emptyState()}
    </div>
  `;

  // Restaurar sección activa
  const activeBtn = document.querySelector('.nav-btn.active');
  if(activeBtn){
    const id = activeBtn.getAttribute('onclick').match(/'(\w+)'/)[1];
    showSection(id, activeBtn);
  } else {
    showSection('metricas', document.querySelector('.nav-btn'));
  }
}

function cargar(){
  const mes  = document.getElementById('sel-mes').value;
  const anio = document.getElementById('inp-anio').value;
  document.getElementById('contenido').innerHTML = '<div class="spinner"><div class="spin"></div></div>';
  fetch(`/api/dashboard?mes=${mes}&anio=${anio}`)
    .then(r=>r.json())
    .then(data=>renderDashboard(data))
    .catch(()=>{
      document.getElementById('contenido').innerHTML='<div class="empty-state"><div class="ico">⚠️</div><p>Error al cargar datos</p></div>';
    });
}

// Inicializar con mes actual
const now = new Date();
document.getElementById('sel-mes').value = now.getMonth()+1;
document.getElementById('inp-anio').value = now.getFullYear();
cargar();
</script>
</body>
</html>
